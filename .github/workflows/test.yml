name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        shell: pwsh
        run: ./scripts/test/unit.ps1

  race:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run race tests
        shell: pwsh
        run: ./scripts/test/race.ps1

  integration:
    runs-on: ubuntu-latest
    needs:
      - unit
      - race
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      toxiproxy:
        image: ghcr.io/shopify/toxiproxy:2.5.0
        ports:
          - 8474:8474
          - 15432:15432
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run integration tests
        shell: pwsh
        env:
          IDGEN_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable
          IDGEN_TEST_TOXIPROXY_URL: http://127.0.0.1:8474
          IDGEN_TEST_TOXIPROXY_UPSTREAM: postgres:5432
          IDGEN_TEST_TOXIPROXY_LISTEN: 0.0.0.0:15432
        run: ./scripts/test/integration.ps1
